{% load tracker_tags %}
<div class="p-3 border rounded bg-light mb-3">
  <h6 class="fw-bold mb-3">
    <i class="bi bi-receipt me-2 text-primary"></i>
    {% if instance %}Editar Nota de Empenho{% else %}Nova Nota de Empenho{% endif %}
  </h6>
  <form hx-post="{% if instance %}{% url 'processos:empenho-nota-edit' instance.pk %}{% else %}{% url 'processos:empenho-nota-add' %}{% endif %}"
        hx-target="#nota-empenho-tbody"
        hx-swap="innerHTML"
        hx-on::after-request="fecharFormNota()">
    {% csrf_token %}
    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label fw-semibold small">Nota de Empenho <span class="text-danger">*</span></label>
        <input type="text" name="numero" class="form-control form-control-sm"
               placeholder="Ex: 2024NE000123"
               value="{{ instance.nota_empenho|default:'' }}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold small">Valor (R$) <span class="text-danger">*</span></label>
        <input type="text" name="valor" class="form-control form-control-sm"
               placeholder="Ex: 15.000,00"
               value="{% if instance %}{{ instance.valor|brl }}{% endif %}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold small">Nº Processo SIPAC</label>
        <input type="text" name="numero_processo_sipac" class="form-control form-control-sm"
               placeholder="Ex: 23074.012345/2024-00"
               value="{{ instance.numero_processo_sipac|default:'' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold small">Link Processo SIPAC</label>
        <input type="url" name="link_processo_sipac" class="form-control form-control-sm"
               placeholder="https://..."
               value="{{ instance.link_processo_sipac|default:'' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold small">Empresa</label>
        <select name="empresa" class="form-select form-select-sm">
          <option value="">(Nenhuma)</option>
          {% for emp in empresas_list %}
            <option value="{{ emp.pk }}" {% if instance.empresa_id == emp.pk %}selected{% endif %}>{{ emp.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 d-flex gap-2 mt-1">
        <button type="submit" class="btn btn-sm btn-success">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="fecharFormNota()">
          Cancelar
        </button>
      </div>
    </div>
  </form>
</div>
