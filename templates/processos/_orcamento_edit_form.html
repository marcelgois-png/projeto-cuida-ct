{% load tracker_tags %}
<div class="modal fade show d-block" tabindex="-1" style="background:rgba(0,0,0,.45);" id="orcamento-edit-modal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content shadow">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-pencil me-2 text-primary"></i>
          Editar Orçamento {{ orcamento.numero_sequencial }}
        </h5>
        <button type="button" class="btn-close" onclick="fecharOrcamentoEdit()"></button>
      </div>
      <form hx-post="{% url 'processos:orcamento-edit' processo.pk orcamento.pk %}"
            hx-target="#orcamento-edit-modal-container"
            hx-swap="innerHTML">
        {% csrf_token %}
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold small">Descrição</label>
              <textarea name="descricao" class="form-control form-control-sm" rows="2"
                        >{{ orcamento.descricao }}</textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Valor (R$)</label>
              <input type="text" name="valor" class="form-control form-control-sm"
                     placeholder="0,00"
                     value="{% if orcamento.valor %}{{ orcamento.valor|brl }}{% endif %}">
              <div class="form-text">Preenchido automaticamente quando há itens com ajustes.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select name="status" class="form-select form-select-sm">
                {% for val, label in status_choices %}
                <option value="{{ val }}" {% if orcamento.status == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Data de emissão</label>
              <input type="date" name="data_emissao" class="form-control form-control-sm"
                     value="{{ orcamento.data_emissao|date:'Y-m-d'|default:'' }}">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="fecharOrcamentoEdit()">
            Cancelar
          </button>
          <button type="submit" class="btn btn-success btn-sm">
            <i class="bi bi-check-lg me-1"></i>Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  document.getElementById('orcamento-edit-modal').addEventListener('click', function(e) {
    if (e.target === this) fecharOrcamentoEdit();
  });
</script>
