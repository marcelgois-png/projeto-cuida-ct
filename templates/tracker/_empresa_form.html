<div class="p-3 border rounded bg-light">
  <h6>{% if instance %}Editar Empresa{% else %}Nova Empresa{% endif %}</h6>
  <form hx-post="{% if instance %}{% url 'empresa-edit' instance.pk %}{% else %}{% url 'empresa-add' %}{% endif %}" 
        hx-target="#empresa-list-body" 
        hx-swap="innerHTML"
        hx-on::after-request="this.closest('#empresa-form-container').innerHTML = ''">
    {% csrf_token %}
    <div class="row g-2">
      <div class="col-md-9">
        <input type="text" name="nome" class="form-control" placeholder="Nome da Empresa" value="{{ instance.nome|default:'' }}" required>
      </div>
      <div class="col-md-3 d-flex align-items-center">
        <div class="form-check form-switch ms-2">
          <input class="form-check-input" type="checkbox" name="ativa" id="empresaAtiva" {% if instance and not instance.ativa %} {% else %} checked {% endif %}>
          <label class="form-check-label" for="empresaAtiva">Ativa</label>
        </div>
      </div>
      <div class="col-12 mt-2">
        <button type="submit" class="btn btn-sm btn-success">Salvar</button>
        <button type="button" class="btn btn-sm btn-neutral ms-1" onclick="this.closest('#empresa-form-container').innerHTML = ''">Cancelar</button>
      </div>
    </div>
  </form>
</div>
