{% for item in gut_params %}
<tr>
  <td class="fw-bold">{{ item.get_tipo_display }}</td>
  <td>
    <span class="badge bg-primary-soft text-primary">{{ item.valor }}</span>
  </td>
  <td>{{ item.descricao }}</td>
  <td class="text-center">
    <div class="btn-group">
      <button class="btn btn-sm btn-outline-primary" 
              hx-get="{% url 'gut-parametro-edit' item.pk %}" 
              hx-target="#gut-form-container">
        <i class="bi bi-pencil"></i>
      </button>
      <button class="btn btn-sm btn-outline-danger" 
              hx-post="{% url 'gut-parametro-delete' item.pk %}" 
              hx-confirm="Excluir este parâmetro?"
              hx-target="#gut-list-body">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </td>
</tr>
{% endfor %}
