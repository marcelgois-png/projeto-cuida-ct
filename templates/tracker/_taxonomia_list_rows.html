{% for item in taxonomia_list %}
<tr>
  <td>{{ item.divisao }}</td>
  <td>{{ item.tipo_servico }}</td>
  <td>{{ item.servico|default:"-" }}</td>
  <td class="text-center">
    <div class="btn-group">
      <button class="btn btn-sm btn-outline-primary" 
              hx-get="{% url 'taxonomia-edit' item.pk %}" 
              hx-target="#taxonomia-form-container">
        <i class="bi bi-pencil"></i>
      </button>
      <button class="btn btn-sm btn-outline-danger" 
              hx-post="{% url 'taxonomia-delete' item.pk %}" 
              hx-confirm="Excluir este serviço?"
              hx-target="#taxonomia-list-body">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </td>
</tr>
{% endfor %}
